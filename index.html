<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GentStyle Shop</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#ffd700;
}

.container{
    padding:20px;
}

.category{
    margin-bottom:40px;
}

.category h2{
    border-left:5px solid #111;
    padding-left:10px;
}

.products{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.product{
    background:white;
    padding:15px;
    width:200px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
    text-align:center;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
}

button{
    background:#111;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#444;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>GentStyle Men's Shop</h1>
<p>Fashion for Modern Men</p>
</header>

<nav>
<a href="#shirts">Shirts</a>
<a href="#pants">Pants</a>
<a href="#shoes">Shoes</a>
<a href="#watches">Watches</a>
</nav>

<div class="container">

<!-- Shirts -->
<div class="category" id="shirts">
<h2>Shirts</h2>
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Casual Shirt</h3>
<p class="price">$25</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Formal Shirt</h3>
<p class="price">$35</p>
<button>Buy Now</button>
</div>

</div>
</div>

<!-- Pants -->
<div class="category" id="pants">
<h2>Pants</h2>
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Jeans</h3>
<p class="price">$40</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Chinos</h3>
<p class="price">$38</p>
<button>Buy Now</button>
</div>

</div>
</div>

<!-- Shoes -->
<div class="category" id="shoes">
<h2>Shoes</h2>
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Running Shoes</h3>
<p class="price">$60</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Formal Shoes</h3>
<p class="price">$75</p>
<button>Buy Now</button>
</div>

</div>
</div>

<!-- Watches -->
<div class="category" id="watches">
<h2>Watches</h2>
<div class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Classic Watch</h3>
<p class="price">$120</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Sport Watch</h3>
<p class="price">$95</p>
<button>Buy Now</button>
</div>

</div>
</div>

</div>

<footer>
<p>© 2026 GentStyle Shop | All Rights Reserved</p>
</footer>

</body>
</html>
